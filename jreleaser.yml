files:
  globs:
    - pattern: artifacts/*.jar
    - pattern: artifacts/*.zip
      extraProperties:
        skipRelease: "true"

assemble:
  archive:
    zip:
      active: ALWAYS
      exported: true
      stereotype: NONE
